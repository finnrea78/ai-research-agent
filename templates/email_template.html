<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Digest — {{DATE}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 20px;
      background: #f8f9fa;
      color: #1a1a2e;
      line-height: 1.6;
    }
    .header {
      background: #1a1a2e;
      color: #e8e8e8;
      padding: 24px;
      border-radius: 8px 8px 0 0;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }
    .header .date {
      color: #a0a0b0;
      font-size: 14px;
      margin-top: 4px;
    }
    .stats {
      background: #2a2a3e;
      color: #c0c0d0;
      padding: 12px 24px;
      font-size: 13px;
      text-align: center;
    }
    .content {
      background: #ffffff;
      padding: 24px;
      border-radius: 0 0 8px 8px;
    }
    h2 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1a1a2e;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 8px;
      margin-top: 28px;
    }
    .highlight {
      background: #f0f4ff;
      border-left: 4px solid #4a6cf7;
      padding: 16px;
      margin: 12px 0;
      border-radius: 0 6px 6px 0;
    }
    .highlight h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }
    .highlight h3 a {
      color: #4a6cf7;
      text-decoration: none;
    }
    .highlight .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .highlight .why {
      font-size: 14px;
      color: #333;
    }
    .highlight .action {
      font-size: 13px;
      color: #4a6cf7;
      font-weight: 600;
      margin-top: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 12px 0;
    }
    th {
      text-align: left;
      padding: 8px;
      background: #f0f0f5;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
    td a {
      color: #4a6cf7;
      text-decoration: none;
    }
    .news-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .news-item a {
      color: #4a6cf7;
      text-decoration: none;
      font-weight: 600;
    }
    .news-item .source {
      color: #888;
      font-style: italic;
    }
    .discovered {
      background: #f0fff0;
      border-left: 4px solid #4CAF50;
      padding: 12px;
      margin: 8px 0;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
    }
    .discovered a {
      color: #2e7d32;
      text-decoration: none;
      font-weight: 600;
    }
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Research Digest</h1>
    <div class="date">{{DATE}}</div>
  </div>
  <div class="stats">{{STATS}}</div>
  <div class="content">
    <h2>Highlights</h2>
    {{HIGHLIGHTS}}

    <h2>Podcasts</h2>
    {{PODCASTS}}

    <h2>Repos &amp; Tools</h2>
    {{REPOS}}

    <h2>News &amp; Analysis</h2>
    {{NEWS}}

    <h2>Discovered Sources</h2>
    {{DISCOVERED}}
  </div>
  <div class="footer">
    Generated by AI Research Agent
  </div>
</body>
</html>
